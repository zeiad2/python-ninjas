<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediFlow | Hospital Management System</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="app">
        <!-- Login Screen -->
        <div id="login-screen" class="screen active">
            <div class="login-card">
                <div class="login-header">
                    <div class="logo">
                        <i data-lucide="heart-pulse"></i>
                        <span>MediFlow</span>
                    </div>
                    <h1>Welcome Back</h1>
                    <p>Please enter your details to sign in</p>
                </div>
                <form id="login-form">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" placeholder="Enter username" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn-primary">Sign In</button>
                </form>
                <div class="login-footer">
                    <p>Don't have an account? <a href="#" id="show-register">Register here</a></p>
                </div>
            </div>
        </div>

        <!-- Main Dashboard (Hidden by default) -->
        <div id="main-dashboard" class="screen">
            <aside class="sidebar">
                <div class="sidebar-header">
                    <i data-lucide="heart-pulse"></i>
                    <span>MediFlow</span>
                </div>
                <nav class="sidebar-nav">
                    <ul>
                        <li class="active" data-view="dashboard"><i data-lucide="layout-dashboard"></i> Dashboard</li>
                        <li data-view="appointments"><i data-lucide="calendar"></i> Appointments</li>
                        <li data-view="patients" class="admin-only"><i data-lucide="users"></i> Patients</li>
                        <li data-view="doctors" class="admin-only"><i data-lucide="user-cog"></i> Doctors</li>
                    </ul>
                </nav>
                <div class="sidebar-footer">
                    <div class="user-info">
                        <div class="avatar" id="user-avatar">U</div>
                        <div class="details">
                            <span id="user-name">User Name</span>
                            <span id="user-role">Role</span>
                        </div>
                    </div>
                    <button id="logout-btn"><i data-lucide="log-out"></i></button>
                </div>
            </aside>
            <main class="content">
                <header class="content-header">
                    <h2 id="view-title">Dashboard</h2>
                    <div class="header-actions">
                        <div id="stats-badge" class="badge">
                            <span class="status-dot online"></span> Live Updates
                        </div>
                    </div>
                </header>
                <div id="view-container">
                    <!-- Dynamic Content Goes Here -->
                </div>
            </main>
        </div>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
